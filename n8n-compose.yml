version: "3.8"

services:
  n8n_postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: n8n-prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - n8n_net
    restart: unless-stopped

  redis_n8n:
    image: redis:7
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    networks:
      - n8n_net
    restart: unless-stopped

  n8n_editor:
    image: n8nio/n8n:1.122.5
    command: start
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_DATABASE: n8n-prod
      DB_POSTGRESDB_HOST: n8n_postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: "${POSTGRES_PASSWORD}"
      QUEUE_BULL_REDIS_HOST: redis_n8n
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: "${REDIS_PASSWORD}"
      EXECUTIONS_MODE: queue
      EXECUTIONS_DATA_MAX_AGE: 720
      EXECUTIONS_DATA_PRUNE_MAX_COUNT: 100000
      EXECUTIONS_DATA_PRUNE: "true"
      GENERIC_TIMEZONE: America/Sao_Paulo
      TZ: America/Sao_Paulo
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_ENCRYPTION_KEY: "${N8N_ENCRYPTION_KEY}"
      N8N_HOST: automations.prologapp.com
      N8N_PROTOCOL: https
      N8N_EDITOR_BASE_URL: "https://automations.prologapp.com/"
      WEBHOOK_URL: "https://automations.prologapp.com/"
      NODE_ENV: production
      NODE_FUNCTION_ALLOW_EXTERNAL: "moment,lodash,moment-with-locales,crypto-js,jszip"
      N8N_LOG_LEVEL: debug
      N8N_LOG_OUTPUT: "file,console"
      N8N_LOG_FILE_LOCATION: /home/node/.n8n/logs/n8n-01.log
      N8N_DEFAULT_BINARY_DATA_MODE: filesystem
      N8N_BINARY_DATA_STORAGE_PATH: /home/node/.n8n/binaryData
      N8N_SECURE_COOKIE: "false"
    volumes:
      - n8n_editor_data:/home/node/.n8n
      - n8n_binary_data:/home/node/.n8n/binaryData
    depends_on:
      - n8n_postgres
      - redis_n8n
    networks:
      - n8n_net
    restart: unless-stopped

  n8n_webhook:
    image: n8nio/n8n:1.122.5
    command: webhook
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_DATABASE: n8n-prod
      DB_POSTGRESDB_HOST: n8n_postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: "${POSTGRES_PASSWORD}"
      QUEUE_BULL_REDIS_HOST: redis_n8n
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: "${REDIS_PASSWORD}"
      EXECUTIONS_MODE: queue
      EXECUTIONS_DATA_MAX_AGE: 720
      EXECUTIONS_DATA_PRUNE_MAX_COUNT: 100000
      EXECUTIONS_DATA_PRUNE: "true"
      GENERIC_TIMEZONE: America/Sao_Paulo
      TZ: America/Sao_Paulo
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_ENCRYPTION_KEY: "${N8N_ENCRYPTION_KEY}"
      N8N_HOST: automations.prologapp.com
      N8N_PROTOCOL: https
      N8N_EDITOR_BASE_URL: "https://automations.prologapp.com/"
      WEBHOOK_URL: "https://automations.prologapp.com/"
      NODE_ENV: production
      NODE_FUNCTION_ALLOW_EXTERNAL: "moment,lodash,moment-with-locales"
      N8N_LOG_LEVEL: debug
      N8N_LOG_OUTPUT: "file,console"
      N8N_LOG_FILE_LOCATION: /home/node/.n8n/logs/n8n-01.log
      N8N_DEFAULT_BINARY_DATA_MODE: filesystem
    volumes:
      - n8n_webhook_data:/home/node/.n8n
      - n8n_binary_data:/home/node/.n8n/binaryData
    depends_on:
      - n8n_postgres
      - redis_n8n
    networks:
      - n8n_net
    restart: unless-stopped

  n8n_worker:
    image: n8nio/n8n:1.122.5
    command: "worker --concurrency=5"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_DATABASE: n8n-prod
      DB_POSTGRESDB_HOST: n8n_postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: "${POSTGRES_PASSWORD}"
      QUEUE_BULL_REDIS_HOST: redis_n8n
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: "${REDIS_PASSWORD}"
      EXECUTIONS_MODE: queue
      EXECUTIONS_DATA_MAX_AGE: 720
      EXECUTIONS_DATA_PRUNE_MAX_COUNT: 100000
      EXECUTIONS_DATA_PRUNE: "true"
      GENERIC_TIMEZONE: America/Sao_Paulo
      TZ: America/Sao_Paulo
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_ENCRYPTION_KEY: "${N8N_ENCRYPTION_KEY}"
      N8N_HOST: automations.prologapp.com
      N8N_PROTOCOL: https
      N8N_EDITOR_BASE_URL: "https://automations.prologapp.com/"
      WEBHOOK_URL: "https://automations.prologapp.com/"
      NODE_ENV: production
      NODE_FUNCTION_ALLOW_EXTERNAL: "moment,lodash,moment-with-locales,crypto-js,jszip"
      N8N_LOG_LEVEL: debug
      N8N_LOG_OUTPUT: "file,console"
      N8N_LOG_FILE_LOCATION: /home/node/.n8n/logs/n8n-01.log
      N8N_DEFAULT_BINARY_DATA_MODE: filesystem
    volumes:
      - n8n_worker_data:/home/node/.n8n
      - n8n_binary_data:/home/node/.n8n/binaryData
    depends_on:
      - n8n_postgres
      - redis_n8n
    networks:
      - n8n_net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  n8n_editor_data:
  n8n_webhook_data:
  n8n_worker_data:
  n8n_binary_data:

networks:
  n8n_net:
    driver: overlay
